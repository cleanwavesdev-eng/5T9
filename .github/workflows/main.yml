name: CleanWave_Auto_Scanner

on:
  schedule:
    - cron: '*/5 * * * *' # يعمل تلقائياً كل 5 دقائق
  workflow_dispatch: # يسمح لك بتشغيله يدوياً للتحربة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas
          # التثبيت من المصدر لتجنب أخطاء التوافق التي ظهرت سابقاً
          pip install git+https://github.com/twopirllc/pandas-ta.git

      - name: Run CleanWave Bot
        run: python bot.py
